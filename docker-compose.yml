services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: mjfkbt3_app
    restart: unless-stopped
    env_file: .env.production
    volumes:
      - storage_data:/var/www/html/storage/app
      - logs_data:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mjfkbt3_net

  nginx:
    image: nginx:1.26-alpine
    container_name: mjfkbt3_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
      - storage_data:/var/www/html/storage/app:ro
    depends_on:
      - app
    networks:
      - mjfkbt3_net

  mysql:
    image: mysql:8.0
    container_name: mjfkbt3_mysql
    restart: unless-stopped
    env_file: .env.production
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mjfkbt3_net

  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: mjfkbt3_queue
    restart: unless-stopped
    env_file: .env.production
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    volumes:
      - storage_data:/var/www/html/storage/app
      - logs_data:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mjfkbt3_net

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: mjfkbt3_scheduler
    restart: unless-stopped
    env_file: .env.production
    command: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - storage_data:/var/www/html/storage/app
      - logs_data:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mjfkbt3_net

volumes:
  mysql_data:
  storage_data:
  logs_data:

networks:
  mjfkbt3_net:
    driver: bridge
