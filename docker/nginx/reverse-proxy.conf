# ─── mjfkbt3.saasku.my — Reverse Proxy Config ────────────────────────────────
# Place this file on your reverse proxy server at:
#   /etc/nginx/sites-available/mjfkbt3.conf
# Then: ln -s /etc/nginx/sites-available/mjfkbt3.conf /etc/nginx/sites-enabled/
# App server backend: 10.63.20.102:80

upstream mjfkbt3_backend {
    server 10.63.20.102:80;
    keepalive 32;
}

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name mjfkbt3.saasku.my;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name mjfkbt3.saasku.my;

    # SSL — update paths to your actual cert location
    ssl_certificate     /etc/letsencrypt/live/mjfkbt3.saasku.my/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mjfkbt3.saasku.my/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 20M;

    location / {
        proxy_pass         http://mjfkbt3_backend;
        proxy_http_version 1.1;

        # Required headers so Laravel knows the real client + protocol
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;

        # Keep-alive to backend
        proxy_set_header   Connection        "";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    120s;

        # Buffer tuning for PHP responses
        proxy_buffering           on;
        proxy_buffer_size         16k;
        proxy_buffers             4 32k;
        proxy_busy_buffers_size   64k;
    }
}
